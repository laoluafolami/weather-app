services:
  weather-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        OPENWEATHERMAP_API_KEY: ${OPENWEATHERMAP_API_KEY:-your_api_key_here}
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - OPENWEATHERMAP_API_KEY=${OPENWEATHERMAP_API_KEY:-your_api_key_here}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
